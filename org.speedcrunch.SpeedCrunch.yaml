app-id: org.speedcrunch.SpeedCrunch
runtime: org.kde.Platform
runtime-version: "5.15"
sdk: org.kde.Sdk
command: speedcrunch
finish-args:
  - "--socket=x11"
  - "--share=ipc"
  - "--socket=wayland"

modules:
  - name: speedcrunch
    buildsystem: cmake-ninja
    subdir: src
    post-install:
      - install -D -m 0644 ../gfx/speedcrunch.svg $FLATPAK_DEST/share/icons/hicolor/scalable/apps/org.speedcrunch.SpeedCrunch.svg
      - |
        for s in 16 22 24 32 48 64 128 256; do
          d=$FLATPAK_DEST/share/icons/hicolor/${s}x${s}/apps
          install -m 0755 -d $d
          rsvg-convert -w $s -h $s ../gfx/speedcrunch.svg -o $d/org.speedcrunch.SpeedCrunch.png
          chmod 0644 $d/org.speedcrunch.SpeedCrunch.png
        done
    sources:
      - type: git
        url: https://bitbucket.org/heldercorreia/speedcrunch.git
        branch: fix-deprecations-and-up-min-qt-make-versions
        commit: bf3678e12165bda7120de2eacaeba6cef59a4574

cleanup:
  - /share/pixmaps
